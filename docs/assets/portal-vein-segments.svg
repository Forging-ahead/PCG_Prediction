<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="600" viewBox="0 0 1040 600" role="img" aria-labelledby="title desc">
  <title id="title">门静脉系统解剖分段示意</title>
  <desc id="desc">用不同颜色表示 MPV、SV、SMV、LPV、RPV、TIPS、LGV 和 PGV 等解剖段，辅助理解 segment_vessels.py 的分段结果。</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17212b" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #d8e1ea; stroke-width: 1.2; filter: url(#softShadow); }
      .title { font: 700 25px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #142230; }
      .note { font: 14px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #607184; }
      .vessel { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 15; opacity: 0.98; }
      .thick { stroke-width: 22; opacity: 0.98; }
      .halo { fill: none; stroke: #ffffff; stroke-width: 30; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
      .node { fill: #17212b; stroke: #ffffff; stroke-width: 4; }
      .label { font: 700 16px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #17212b; }
      .small { font: 12px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #607184; }
      .legendText { font: 13px "Microsoft YaHei", "Segoe UI", sans-serif; fill: #243447; }
    </style>
  </defs>
  <rect class="bg" width="1040" height="600"/>
  <rect class="panel" x="36" y="32" width="968" height="536" rx="22"/>
  <text class="title" x="70" y="78">门静脉系统解剖分段示意</text>
  <text class="note" x="70" y="106">颜色与 Web Workbench / 可视化导出一致，便于核对 `centerline_profiles.json` 中的段名。</text>

  <g transform="translate(70 92)">
    <path class="halo" d="M470 350 C475 298, 487 255, 506 214 C524 175, 532 142, 526 104"/>
    <path class="halo" d="M506 214 C430 198, 350 186, 260 154 C210 136, 168 120, 112 116"/>
    <path class="halo" d="M470 350 C402 375, 328 414, 240 448 C190 468, 150 472, 103 462"/>
    <path class="halo" d="M526 104 C472 82, 426 55, 370 42"/>
    <path class="halo" d="M526 104 C592 84, 653 68, 720 42"/>
    <path class="halo" d="M515 165 C610 168, 690 196, 778 230"/>
    <path class="halo" d="M428 302 C356 291, 286 275, 214 252"/>
    <path class="halo" d="M432 330 C384 330, 346 342, 304 366"/>

    <path class="vessel thick" stroke="#ff3333" d="M470 350 C475 298, 487 255, 506 214 C524 175, 532 142, 526 104"/>
    <path class="vessel thick" stroke="#3380ff" d="M506 214 C430 198, 350 186, 260 154 C210 136, 168 120, 112 116"/>
    <path class="vessel thick" stroke="#ff9933" d="M470 350 C402 375, 328 414, 240 448 C190 468, 150 472, 103 462"/>
    <path class="vessel thin" stroke="#b34dff" d="M526 104 C472 82, 426 55, 370 42"/>
    <path class="vessel thin" stroke="#33e666" d="M526 104 C592 84, 653 68, 720 42"/>
    <path class="vessel thin" stroke="#00c7c7" d="M515 165 C610 168, 690 196, 778 230"/>
    <path class="vessel thin" stroke="#d6a800" d="M428 302 C356 291, 286 275, 214 252"/>
    <path class="vessel thin" stroke="#ff4dee" d="M432 330 C384 330, 346 342, 304 366"/>

    <circle class="node" cx="506" cy="214" r="8"/>
    <circle class="node" cx="526" cy="104" r="8"/>
    <circle class="node" cx="470" cy="350" r="8"/>

    <text class="label" x="532" y="248" fill="#ff3333">MPV 门静脉主干</text>
    <text class="small" x="532" y="268">连接入流端与肝内分叉</text>
    <text class="label" x="98" y="96" fill="#3380ff">SV 脾静脉</text>
    <text class="label" x="80" y="494" fill="#ff9933">SMV 肠系膜上静脉</text>
    <text class="label" x="278" y="34" fill="#b34dff">LPV 左支</text>
    <text class="label" x="724" y="36" fill="#33e666">RPV 右支</text>
    <text class="label" x="786" y="236" fill="#00a7a7">TIPS 支架</text>
    <text class="label" x="150" y="252" fill="#b88b00">LGV</text>
    <text class="label" x="280" y="394" fill="#d42fc9">PGV</text>

    <g transform="translate(790 312)">
      <rect x="0" y="0" width="124" height="142" rx="12" fill="#f8fafc" stroke="#d8e1ea"/>
      <text class="label" x="18" y="28">图例</text>
      <g transform="translate(18 48)">
        <circle cx="8" cy="0" r="6" fill="#ff3333"/><text class="legendText" x="22" y="5">MPV</text>
        <circle cx="8" cy="22" r="6" fill="#3380ff"/><text class="legendText" x="22" y="27">SV</text>
        <circle cx="8" cy="44" r="6" fill="#ff9933"/><text class="legendText" x="22" y="49">SMV</text>
        <circle cx="8" cy="66" r="6" fill="#b34dff"/><text class="legendText" x="22" y="71">LPV</text>
        <circle cx="8" cy="88" r="6" fill="#33e666"/><text class="legendText" x="22" y="93">RPV</text>
      </g>
    </g>
  </g>
</svg>
